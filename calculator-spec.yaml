result_logic_notes:
  primary_result: "Back-end DTI is the headline answer whenever gross monthly income is entered and at least one included debt or housing amount is present."
  minimum_viable_calculation: "The calculator must be able to run with gross monthly income plus any entered monthly debt amount. Blank optional fields count as zero."
  housing_logic: "Front-end DTI should only appear when a housing amount is present and the user has chosen to show it. Housing cost used for front-end DTI equals proposed_housing_payment plus property_taxes_monthly plus heating_monthly plus condo_fees_monthly."
  current_vs_proposed_logic: "Back-end DTI should include current_housing_payment only when include_current_housing is true and current_housing_payment is greater than zero. It should include proposed_housing_payment plus related housing extras only when include_proposed_housing is true and the proposed fields are populated. The experience should avoid double-counting by making it visually clear whether the user is modeling current obligations, a future scenario, or both."
  debt_components: "Non-housing debt used is the sum of car_loans_monthly, student_loans_monthly, credit_card_minimums_monthly, personal_loans_monthly, lines_of_credit_monthly, child_support_alimony_monthly, and other_monthly_debt."
  validation: "Negative values are invalid. Zero income is invalid and must trigger a clear validation state. Empty optional fields should be treated as zero, not as errors."
  comparison_logic: "Scenario comparison should compare the primary back-end DTI result for the active scenario against a saved or generated comparison scenario and report the difference in percentage points."
  educational_bands:
    lower_stronger_range: "Back-end DTI below roughly 36 percent can be described as a lower or stronger planning range."
    moderate_workable_range: "Back-end DTI from roughly 36 percent to 43 percent can be described as a moderate or workable planning range."
    stretched_higher_risk_range: "Back-end DTI above roughly 43 percent can be described as a stretched or higher-risk planning range."
  band_disclaimer: "Interpretation bands are general educational guidance only. They are not approval rules and must not be presented as lender guarantees."
  derived_estimates: "Estimated room before target band should show how much additional monthly debt or housing cost could fit before reaching the selected educational threshold, if positive. Estimated income needed for target should show the gross monthly income required to bring the current back-end DTI to the target band. Estimated debt reduction needed for target should show the monthly debt reduction required to bring the current back-end DTI to the target band."

