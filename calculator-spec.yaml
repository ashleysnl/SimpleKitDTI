  - id: "property_taxes_monthly"
    label: "Monthly property taxes"
    type: "currency"
    required: false
    default: 0
    min: 0
    step: 10
    helper_text: "Include only if you want taxes counted in the housing cost assumption."
    group: "housing"
  - id: "heating_monthly"
    label: "Monthly heating cost used in housing estimate"
    type: "currency"
    required: false
    default: 0
    min: 0
    step: 10
