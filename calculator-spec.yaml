name: "Debt-to-Income Ratio Calculator"
slug: "debt-to-income-ratio-calculator"
repo_name: "simplekit-dti-calculator"
subdomain: "dti"

seo:
  page_title: "Debt-to-Income Ratio Calculator for Mortgage and Loan Planning"
  meta_description: "Calculate your debt-to-income ratio, compare front-end vs back-end DTI, test a future mortgage payment, and see whether your ratio looks healthy, borderline, or stretched."
  h1: "Debt-to-Income Ratio Calculator"

calculator:
  description: "Use this debt-to-income ratio calculator to estimate how much of your gross monthly income is already committed to debt payments, housing costs, or both. The tool is designed for practical planning: it helps users calculate a basic DTI, compare front-end and back-end DTI, test a future housing payment, and understand how their current debts may affect mortgage readiness, borrowing capacity, and monthly flexibility."
  formula_notes: "Back-end DTI is calculated as total monthly debt obligations divided by gross monthly income. When the user enters a proposed housing payment and chooses to include it, the proposed housing payment is added to the debt total used for the ratio. Front-end DTI is calculated as proposed monthly housing cost divided by gross monthly income. Housing cost can include the main housing payment plus property taxes, heating, and the applicable portion of condo fees or HOA dues. Debts normally included in DTI-style planning estimates are housing payment, property tax, condo fees or HOA dues, heating when included in the housing assumption, car loans, student loans, credit card minimum payments, lines of credit, personal loans, child support, alimony, and other required monthly obligations. Items usually not included in standard DTI planning estimates are groceries, entertainment, discretionary spending, most utilities outside the housing model unless explicitly included, savings contributions, and insurance categories not already built into the housing payment assumption. This calculator is educational and uses general planning logic rather than lender-specific underwriting rules."

inputs:
  - id: "gross_monthly_income"
    label: "Gross monthly income before tax"
    type: "currency"
    required: true
    default: 6000
    min: 0
    step: 50
    helper_text: "Enter your monthly income before tax, deductions, or benefits withholding."
    group: "core"
  - id: "dti_mode"
    label: "Calculation focus"
    type: "select"
    required: true
    default: "current-plus-proposed"
    options:
      - value: "current-only"
        label: "Current debt only"
      - value: "current-plus-proposed"
        label: "Current debt plus a future housing payment"
      - value: "proposed-only"
        label: "Future housing payment only"
    helper_text: "Choose whether you want a simple debt snapshot or a mortgage planning estimate."
    group: "core"
  - id: "scenario_name"
    label: "Scenario name"
    type: "text"
    required: false
    default: "Base scenario"
    helper_text: "Optional label for sharing or comparing scenarios."
    group: "core"
  - id: "province_or_region"
    label: "Province or region"
    type: "select"
    required: false
    default: "canada-general"
    options:
      - value: "canada-general"
        label: "Canada - general estimate"
      - value: "alberta"
        label: "Alberta"
      - value: "british-columbia"
        label: "British Columbia"
      - value: "manitoba"
        label: "Manitoba"
      - value: "new-brunswick"
        label: "New Brunswick"
      - value: "newfoundland-and-labrador"
        label: "Newfoundland and Labrador"
      - value: "nova-scotia"
        label: "Nova Scotia"
      - value: "ontario"
        label: "Ontario"
      - value: "prince-edward-island"
        label: "Prince Edward Island"
      - value: "quebec"
        label: "Quebec"
      - value: "saskatchewan"
        label: "Saskatchewan"
      - value: "territories"
        label: "Northern territories"
      - value: "outside-canada"
        label: "Outside Canada"
    helper_text: "Used for copy personalization only, not lender-specific qualification rules."
