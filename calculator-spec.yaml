content:
  intro: "Your debt-to-income ratio, or DTI, shows how much of your gross monthly income goes toward required debt payments. It is one of the simplest ways to pressure-test whether a housing payment or loan plan fits comfortably within your budget. Lenders often look at DTI when reviewing mortgage or loan applications, but borrowers can use it too as a practical planning tool before they apply. This calculator helps you estimate both front-end DTI, which focuses on housing cost, and back-end DTI, which includes housing plus other monthly debt obligations. Use it as a planning estimate to understand whether your current debt load looks manageable, borderline, or stretched before you move on to a mortgage, affordability, or budgeting decision."
  result_explanation: "Your results show the share of your gross monthly income that is already committed to debt. A lower percentage usually means more flexibility in your budget, while a higher percentage can signal tighter cash flow and less room for a new payment. Front-end DTI looks only at housing cost, while back-end DTI includes the rest of your monthly debt obligations and is the more useful headline number for most planning decisions. Different lenders may use different formulas, debt rules, and qualifying thresholds, so this calculator should be treated as an estimate rather than a guarantee. DTI is also only one part of approval. Credit history, down payment, assets, property type, and lender policy can all matter. If you want to improve your result, the usual levers are lowering debt payments, increasing gross income, or testing a lower proposed housing payment."
  methodology: "This calculator uses a simple monthly cash-flow ratio based on gross income. It totals the debt and housing amounts the user chooses to include, divides that total by gross monthly income, and returns the result as a percentage. Front-end DTI is shown only when housing inputs are available. Back-end DTI is always the primary answer because it reflects a fuller picture of the obligations that compete for monthly income."
  how_to_use: "Start with your gross monthly income, then add any required monthly debt payments you want included in the ratio. If you are planning for a home purchase, turn on the proposed housing fields and enter the payment you want to test, along with property taxes, heating, and condo fees if those are relevant. Use the result as a planning estimate, then compare scenarios by adjusting the proposed housing amount or debt payments."
  what_counts_as_debt: "DTI planning usually includes required monthly obligations such as rent or mortgage payments when relevant to the scenario, property taxes, condo fees or HOA dues, heating when part of the housing assumption, car loans, student loans, credit card minimums, personal loans, lines of credit, child support, alimony, and other recurring debt payments."
  what_not_to_include: "DTI planning estimates usually do not include groceries, entertainment, restaurants, travel, subscriptions, savings contributions, and most discretionary spending. Utilities outside the housing assumption model also are not normally included unless you are intentionally adding them for a stricter budgeting view."
  interpretation_notes: "A lower DTI generally suggests more breathing room, while a higher DTI suggests that debt obligations are taking a larger share of income. Educational threshold bands can help users interpret the result, but they should be framed as broad planning ranges only and never as approval promises."
  comparison_notes: "Scenario comparison should help users answer practical questions such as how a new mortgage payment changes their back-end DTI, how paying off a car loan improves the ratio, or how much extra income would be needed to move back into a more comfortable range."

faq:
  - question: "What is a debt-to-income ratio?"
    answer: "A debt-to-income ratio compares your required monthly debt payments with your gross monthly income before tax. It gives you a quick way to see how much of your income is already committed to obligations like housing, car loans, student loans, and credit card minimum payments."
  - question: "How do I calculate DTI?"
    answer: "To calculate back-end DTI, add up your required monthly debt payments and divide that total by your gross monthly income. To calculate front-end DTI, divide your monthly housing cost by your gross monthly income. This calculator does both automatically and lets you test a future housing payment too."
  - question: "What is the difference between front-end and back-end DTI?"
    answer: "Front-end DTI looks only at housing cost, such as a mortgage or rent plus housing-related extras you choose to include. Back-end DTI includes housing cost plus other monthly debt payments. For most borrowers, back-end DTI is the more useful overall planning ratio."
  - question: "What is considered a good debt-to-income ratio?"
    answer: "In general, a lower DTI is better because it leaves more room in your budget. Many people use broad planning ranges such as under 36 percent for a stronger position, around 36 to 43 percent for a workable range, and above 43 percent as more stretched. These are educational guidelines only, not lender promises."
  - question: "Does DTI include rent?"
    answer: "It can. If you are looking at your current obligations, rent can be included as part of your housing cost. If you are planning for a future mortgage, you might instead test a proposed housing payment and compare the result to your current situation."
  - question: "Do credit card balances or minimum payments count in DTI?"
    answer: "The monthly payment is what usually matters in DTI planning, not the full balance. For credit cards, the most practical input is the required minimum monthly payment because that is the amount competing for your monthly income."
  - question: "Does DTI include utilities or groceries?"
    answer: "Usually no. Standard DTI-style planning focuses on required debt and housing obligations, not regular living expenses like groceries, entertainment, or most utilities. Some mortgage planning models include heating as part of a housing assumption, which is why this calculator gives you the option to include it."
  - question: "Can I qualify for a mortgage with a high DTI?"
    answer: "Possibly, but a higher DTI can make qualification harder and reduce your margin for unexpected costs. Mortgage approval depends on more than one ratio, including credit, income stability, down payment, property details, and lender policy. This calculator is best used as a planning tool, not an approval predictor."
  - question: "How can I lower my debt-to-income ratio?"
    answer: "The main ways to lower DTI are to pay down monthly debt obligations, increase gross income, or choose a lower housing payment. Even small changes to a car loan, credit card minimum, or proposed mortgage payment can meaningfully improve the result."
  - question: "Is this DTI calculator accurate?"
    answer: "It is accurate for the inputs and assumptions you provide, but it is still an estimate. Real lenders may calculate debt differently, count certain obligations in their own way, or use additional rules that are not captured in a general planning calculator."

