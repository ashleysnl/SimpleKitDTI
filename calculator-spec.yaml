  - id: "include_proposed_housing"
    label: "Include a proposed housing payment in back-end DTI"
    type: "toggle"
    required: false
    default: true
    helper_text: "Turn this on to test a future mortgage, rent, or housing cost scenario."
    group: "housing"
  - id: "proposed_housing_payment"
    label: "Proposed monthly housing payment"
    type: "currency"
    required: false
    default: 2200
    min: 0
    step: 25
    helper_text: "Base housing payment to test for a future home or rental plan."
