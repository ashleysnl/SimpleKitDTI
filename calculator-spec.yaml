  - "Make scenario testing central to the experience so users can quickly compare a lower or higher housing payment."
  - "Use a simple mode with only core fields first, then reveal advanced housing and debt details progressively."
  - "Keep the design aligned with SimpleKit's calm editorial style and shared shell structure."
  - "Ensure explanatory content, FAQs, and methodology remain crawlable in HTML for SEO."
  - "Avoid framework-specific assumptions unless the existing template already uses them."
  - "Keep the tool static-site friendly with client-side enhancement only."
  - "Include accessible labels, descriptive helper text, keyboard-friendly controls, and aria-live summaries for result updates."
