  - id: "include_current_housing"
    label: "Include my current housing payment in back-end DTI"
    type: "toggle"
    required: false
    default: true
    helper_text: "Useful when you want a snapshot of your current obligations."
    group: "housing"
  - id: "current_housing_payment"
    label: "Current monthly housing payment"
    type: "currency"
    required: false
    default: 0
    min: 0
    step: 25
    helper_text: "Rent or current mortgage payment. Leave blank or zero if not needed."
